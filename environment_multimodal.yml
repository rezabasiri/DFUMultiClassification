name: multimodal
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.14
  - pip
  # Scientific computing
  - numpy=1.26.4
  - scipy=1.16.3
  - pandas=2.3.3
  - scikit-learn=1.5.2
  - statsmodels=0.14.6
  - imbalanced-learn=0.12.4
  # Visualization
  - matplotlib=3.10.8
  - seaborn=0.13.2
  - pillow=12.1.0
  # Image processing
  - opencv=4.12.0
  # Utilities
  - tqdm=4.67.1
  - pyyaml=6.0.3
  - joblib=1.5.3
  # Jupyter (optional, for notebooks)
  - jupyter
  - ipykernel
  # Pip-installed packages (ML frameworks, GPU-specific)
  - pip:
      # TensorFlow (primary DL framework)
      - tensorflow==2.18.1
      - keras==3.13.2
      - tensorboard==2.18.0
      # PyTorch (used by generative augmentation, LPIPS)
      - torch==2.9.1
      - torchvision==0.24.1
      - torchmetrics==1.8.2
      # Hugging Face (generative augmentation models)
      - transformers==4.57.6
      - diffusers==0.36.0
      - accelerate==1.12.0
      - safetensors==0.7.0
      - peft==0.18.1
      # Experiment tracking
      - wandb==0.24.0
      # Explainability
      - shap==0.49.1
      # Hyperparameter optimization
      - scikit-optimize==0.10.2
      # Other
      - lpips==0.1.4
      - numba==0.63.1
      - protobuf==4.25.8
      - h5py==3.15.1
